name = "agent-swarm"
main = "src/index.ts"
compatibility_date = "2025-03-25"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "public"

[ai]
binding = "AI"

[[d1_databases]]
binding = "DB"
database_name = "agent-swarm-state"
database_id = "d4391b77-e8d9-4a3a-b137-5e05f5cbc851"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AgentManager", "CodeAgent", "TestAgent", "ReviewAgent", "BuildAgent", "DocsAgent"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["SecurityAgent", "DesignAgent"]

[durable_objects]
bindings = [
  { name = "AGENT_MANAGER", class_name = "AgentManager" },
  { name = "CODE_AGENT", class_name = "CodeAgent" },
  { name = "TEST_AGENT", class_name = "TestAgent" },
  { name = "REVIEW_AGENT", class_name = "ReviewAgent" },
  { name = "BUILD_AGENT", class_name = "BuildAgent" },
  { name = "DOCS_AGENT", class_name = "DocsAgent" },
  { name = "SECURITY_AGENT", class_name = "SecurityAgent" },
  { name = "DESIGN_AGENT", class_name = "DesignAgent" },
]

# Task Queue: Agent Manager produces, Worker consumes and routes to agents
[[queues.producers]]
queue = "task-queue"
binding = "TASK_QUEUE"

[[queues.consumers]]
queue = "task-queue"
max_batch_size = 5
max_batch_timeout = 3
max_retries = 3
dead_letter_queue = "task-queue-dlq"
max_concurrency = 10

# Dead letter queue for failed tasks
[[queues.producers]]
queue = "task-queue-dlq"
binding = "TASK_DLQ"

[[queues.consumers]]
queue = "task-queue-dlq"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 0

# Task Pipeline Workflow: durable multi-step agent orchestration
[[workflows]]
name = "task-pipeline"
binding = "TASK_PIPELINE"
class_name = "TaskPipeline"

# R2 for artifacts (code outputs, exports, logs)
[[r2_buckets]]
binding = "ARTIFACTS"
bucket_name = "agent-swarm-artifacts"

# KV for caching (task results, agent configs)
[[kv_namespaces]]
binding = "CACHE"
id = "f278ae9022b1433eb762ab554826f512"

[observability]
enabled = true
