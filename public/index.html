<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Swarm Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; }
    .container { max-width: 960px; margin: 0 auto; padding: 24px; }
    h1 { font-size: 24px; margin-bottom: 24px; color: #fff; }
    h2 { font-size: 18px; margin-bottom: 12px; color: #ccc; }

    /* Create Task Form */
    .card { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
    .form-row { display: flex; gap: 12px; margin-bottom: 12px; }
    .form-row > * { flex: 1; }
    label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; }
    input, select, textarea { width: 100%; padding: 8px 12px; background: #0a0a0a; border: 1px solid #333; border-radius: 4px; color: #e0e0e0; font-size: 14px; }
    textarea { min-height: 80px; resize: vertical; }
    button { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 500; }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    .btn-approve { background: #22c55e; color: #fff; }
    .btn-approve:hover { background: #16a34a; }
    .btn-reject { background: #ef4444; color: #fff; }
    .btn-reject:hover { background: #dc2626; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }

    /* Task List */
    .task-list { display: flex; flex-direction: column; gap: 8px; }
    .task-item { background: #1a1a1a; border: 1px solid #333; border-radius: 6px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
    .task-item:hover { border-color: #555; }
    .task-type { font-size: 11px; font-weight: 600; text-transform: uppercase; padding: 2px 8px; border-radius: 3px; min-width: 56px; text-align: center; }
    .type-code { background: #1e3a5f; color: #60a5fa; }
    .type-test { background: #1a3d2e; color: #4ade80; }
    .type-review { background: #3d2e1a; color: #fb923c; }
    .type-build { background: #3d1a3d; color: #c084fc; }
    .type-docs { background: #1a2e3d; color: #67e8f9; }
    .task-desc { flex: 1; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .task-status { font-size: 12px; padding: 2px 8px; border-radius: 3px; }
    .status-pending { background: #333; color: #888; }
    .status-queued { background: #1e3a5f; color: #60a5fa; }
    .status-assigned { background: #3d2e1a; color: #fb923c; }
    .status-running { background: #1a3d2e; color: #fbbf24; }
    .status-review { background: #3d3d1a; color: #facc15; }
    .status-completed { background: #1a3d2e; color: #4ade80; }
    .status-failed { background: #3d1a1a; color: #f87171; }
    .task-time { font-size: 11px; color: #666; min-width: 70px; text-align: right; }
    .task-actions { display: flex; gap: 6px; }

    /* Output Panel */
    .output-panel { margin-top: 12px; padding: 12px; background: #0a0a0a; border-radius: 4px; border: 1px solid #333; }
    .output-panel pre { font-size: 13px; white-space: pre-wrap; word-break: break-word; color: #a0a0a0; }

    /* Review Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center; }
    .modal-overlay.active { display: flex; }
    .modal { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 24px; width: 400px; }
    .modal h3 { margin-bottom: 16px; }
    .modal-actions { display: flex; gap: 12px; margin-top: 16px; justify-content: flex-end; }

    /* Refresh */
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .auto-refresh { font-size: 12px; color: #666; }
    .checkbox-label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .checkbox-label input { width: auto; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Agent Swarm Dashboard</h1>

    <!-- Create Task -->
    <div class="card">
      <h2>Create Task</h2>
      <form id="createForm">
        <div class="form-row">
          <div>
            <label>Type</label>
            <select id="taskType">
              <option value="code">Code</option>
              <option value="test">Test</option>
              <option value="review">Review</option>
              <option value="build">Build</option>
              <option value="docs">Docs</option>
            </select>
          </div>
          <div>
            <label>Mode</label>
            <select id="taskMode">
              <option value="queue">Queue (fire-and-forget)</option>
              <option value="workflow">Workflow (durable)</option>
              <option value="workflow-review">Workflow + Review</option>
            </select>
          </div>
        </div>
        <div>
          <label>Description</label>
          <textarea id="taskDesc" placeholder="Describe the task..."></textarea>
        </div>
        <div style="margin-top: 12px;">
          <button type="submit" class="btn-primary">Create Task</button>
        </div>
      </form>
    </div>

    <!-- Task List -->
    <div class="toolbar">
      <h2>Tasks</h2>
      <div style="display: flex; gap: 16px; align-items: center;">
        <label class="checkbox-label auto-refresh">
          <input type="checkbox" id="autoRefresh" checked> Auto-refresh (5s)
        </label>
        <button class="btn-primary btn-sm" onclick="loadTasks()">Refresh</button>
      </div>
    </div>
    <div id="taskList" class="task-list"></div>
  </div>

  <!-- Review Modal -->
  <div class="modal-overlay" id="reviewModal">
    <div class="modal">
      <h3>Review Task</h3>
      <div id="reviewOutput"></div>
      <div>
        <label>Feedback</label>
        <textarea id="reviewFeedback" placeholder="Optional feedback..."></textarea>
      </div>
      <div>
        <label>Reviewer</label>
        <input id="reviewerName" value="david@rebelgroup.com">
      </div>
      <div class="modal-actions">
        <button class="btn-reject" onclick="submitReview(false)">Reject</button>
        <button class="btn-approve" onclick="submitReview(true)">Approve</button>
      </div>
    </div>
  </div>

  <script>
    const API = '/api/tasks';
    let currentReviewTaskId = null;
    let refreshInterval = null;

    // Create task
    document.getElementById('createForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const mode = document.getElementById('taskMode').value;
      const body = {
        description: document.getElementById('taskDesc').value,
        type: document.getElementById('taskType').value,
        useWorkflow: mode !== 'queue',
        requiresReview: mode === 'workflow-review',
      };
      await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      document.getElementById('taskDesc').value = '';
      loadTasks();
    });

    // Load tasks
    async function loadTasks() {
      try {
        const res = await fetch(API);
        if (!res.ok) return;
        const tasks = await res.json();
        renderTasks(Array.isArray(tasks) ? tasks : []);
      } catch (e) {
        console.error('Failed to load tasks:', e);
      }
    }

    function renderTasks(tasks) {
      const list = document.getElementById('taskList');
      if (!tasks.length) {
        list.innerHTML = '<div style="color:#666;padding:20px;text-align:center;">No tasks yet</div>';
        return;
      }
      list.innerHTML = tasks.map(t => {
        const time = new Date(t.created_at + 'Z').toLocaleTimeString();
        const actions = t.status === 'review'
          ? `<div class="task-actions"><button class="btn-approve btn-sm" onclick="openReview('${t.id}')">Review</button></div>`
          : '';
        const output = (t.status === 'completed' && t.output)
          ? `<div class="output-panel"><pre>${escapeHtml(formatOutput(t.output))}</pre></div>`
          : (t.status === 'failed' && t.error)
          ? `<div class="output-panel"><pre style="color:#f87171;">${escapeHtml(t.error)}</pre></div>`
          : '';
        return `
          <div class="task-item" onclick="this.querySelector('.output-panel')?.classList.toggle('collapsed')">
            <span class="task-type type-${t.type}">${t.type}</span>
            <span class="task-desc">${escapeHtml(t.description)}</span>
            <span class="task-status status-${t.status}">${t.status}</span>
            <span class="task-time">${time}</span>
            ${actions}
          </div>
          ${output}`;
      }).join('');
    }

    function formatOutput(outputStr) {
      try {
        const obj = JSON.parse(outputStr);
        if (obj.code) return obj.code;
        return JSON.stringify(obj, null, 2);
      } catch { return outputStr; }
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // Review
    function openReview(taskId) {
      currentReviewTaskId = taskId;
      document.getElementById('reviewModal').classList.add('active');
    }

    async function submitReview(approved) {
      if (!currentReviewTaskId) return;
      await fetch(`${API}/${currentReviewTaskId}/review`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          approved,
          reviewer: document.getElementById('reviewerName').value,
          feedback: document.getElementById('reviewFeedback').value,
        }),
      });
      document.getElementById('reviewModal').classList.remove('active');
      document.getElementById('reviewFeedback').value = '';
      currentReviewTaskId = null;
      loadTasks();
    }

    // Close modal on overlay click
    document.getElementById('reviewModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) {
        e.currentTarget.classList.remove('active');
        currentReviewTaskId = null;
      }
    });

    // Auto-refresh
    function setupAutoRefresh() {
      if (refreshInterval) clearInterval(refreshInterval);
      if (document.getElementById('autoRefresh').checked) {
        refreshInterval = setInterval(loadTasks, 5000);
      }
    }
    document.getElementById('autoRefresh').addEventListener('change', setupAutoRefresh);

    // Init
    loadTasks();
    setupAutoRefresh();
  </script>
</body>
</html>
